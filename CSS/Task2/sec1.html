<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="sec1.css">
</head>
<body>

    <div class="wrapper">

        <form action="">
            <h1>Sign in</h1>

            <div class="input-box">
                <input type="email" placeholder="Email or Phone" required>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" required>
            </div>

            <div class="forget">
                <a href="#">Forget Password?</a>
            </div>

            <button class="btn" type="submit">Sign in</button>
            <button class="btn" type="submit">Sign in with Apple</button>

            <div class="register">
                <p>New to Linkedin? <a href="#">Join now</a></p>
            </div>
            
        </form>

    </div>

</body>
</html>
