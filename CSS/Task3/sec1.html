<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="sec1.css">
</head>
<body>

    <div class="wrapper">

        <form action="">
            <h1>Sign up</h1>

            <div class="input-box1">
                <input type="text" placeholder="First Name">
                <input type="text" placeholder="Last Name">
            </div>
            <div class="input-box">
                <input type="email" placeholder="Email or Phone" required>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" required>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Confirm Password" required>
            </div>

            <input type="checkbox" class="check"><span>I accept the terms of use & privacy policy</span> 

            <button class="btn" type="submit">Sign Up</button>

            <div class="register">
                <p>Already have an account? <a href="#">Login here</a></p><br>
                <p>Copyright &copy; Wheelz.com</p>
            </div>
            
        </form>

    </div>

</body>
</html>
